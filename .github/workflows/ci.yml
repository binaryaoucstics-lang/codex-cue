name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Run core tests
        shell: powershell
        run: .\scripts\test.ps1 -SkipUi
      - name: Validate plugin contract
        shell: powershell
        run: .\tests\plugin-contract.ps1
